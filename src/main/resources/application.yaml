spring:
  application:
    name: aircraft-service

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/aircraft_db?currentSchema=aircraft
#    url: jdbc:postgresql://host.docker.internal:5432/aircraft_db?currentSchema=aircraft
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8081

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
#      endpoint: http://localhost:9411/api/v2/spans
#      endpoint: http://zipkin:9411/api/v2/spans
      endpoint: http://localhost:9411/api/v2/spans

logging:
  pattern:
    level:%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka




